<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toolbench — Developer Utility Toolkit</title>

<link rel="icon" type="image/svg+xml" href="logo.svg">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="48x48" href="favicon-48x48.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="manifest" href="site.webmanifest">
<meta name="theme-color" content="#14151a">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material-darker.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/sql/sql.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/yaml/yaml.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<style>
:root, [data-theme="dark"]{
  --bg-app:#14151a; --bg-sidebar:#191b21; --bg-panel:#1d1f26; --bg-elevated:#242631;
  --bg-input:#1a1c24; --border:#2a2d38; --border-soft:#232530;
  --text-primary:#e6e8ee; --text-secondary:#9298ac; --text-dim:#5b6072;
  --accent:#6c8dff; --accent-hover:#82a0ff; --accent-soft:rgba(108,141,255,.14); --accent-text:#0d1020;
  --success:#4fd18b; --warning:#e8a33d; --danger:#f0616d;
  --shadow:0 8px 28px rgba(0,0,0,.45);
  --mono:'JetBrains Mono',ui-monospace,monospace; --ui:'Inter',system-ui,sans-serif;
}
[data-theme="light"]{
  --bg-app:#f4f5f8; --bg-sidebar:#ffffff; --bg-panel:#ffffff; --bg-elevated:#eef0f5;
  --bg-input:#fbfbfd; --border:#dfe2ea; --border-soft:#e8eaf0;
  --text-primary:#1c1e26; --text-secondary:#5c6070; --text-dim:#9599a8;
  --accent:#4a63e8; --accent-hover:#3a52d6; --accent-soft:rgba(74,99,232,.10); --accent-text:#ffffff;
  --success:#1e9e63; --warning:#b3720a; --danger:#d43f4c;
  --shadow:0 8px 28px rgba(30,32,50,.12);
}
*{box-sizing:border-box;}
html,body{height:100%;margin:0;}
body{
  font-family:var(--ui); background:var(--bg-app); color:var(--text-primary);
  overflow:hidden; -webkit-font-smoothing:antialiased;
}
button{font-family:inherit;}
::selection{background:var(--accent-soft);}
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:6px;border:2px solid transparent;background-clip:padding-box;}
::-webkit-scrollbar-thumb:hover{background:var(--text-dim);background-clip:padding-box;}

/* ---------- App shell ---------- */
#app{display:flex;flex-direction:column;height:100vh;}

/* Topbar */
#topbar{
  height:46px;min-height:46px;display:flex;align-items:center;gap:10px;
  padding:0 12px;background:var(--bg-sidebar);border-bottom:1px solid var(--border);
  -webkit-app-region:drag;
}
.brand{display:flex;align-items:center;gap:8px;font-weight:700;font-size:13.5px;letter-spacing:.2px;margin-right:6px;color:var(--text-primary);}
.brand .mark{width:20px;height:20px;border-radius:5px;background:linear-gradient(135deg,var(--accent),#a78bfa);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#0d1020;}
.tb-search{
  flex:1;max-width:420px;display:flex;align-items:center;gap:8px;background:var(--bg-input);
  border:1px solid var(--border);border-radius:7px;padding:0 10px;height:30px;color:var(--text-dim);cursor:pointer;
}
.tb-search:hover{border-color:var(--text-dim);}
.tb-search kbd{margin-left:auto;font-size:10.5px;background:var(--bg-elevated);border:1px solid var(--border);border-radius:4px;padding:1px 5px;color:var(--text-secondary);font-family:var(--mono);}
.tb-spacer{flex:1;}
.tb-btn{
  display:flex;align-items:center;gap:6px;background:transparent;border:1px solid transparent;color:var(--text-secondary);
  border-radius:6px;padding:6px 9px;font-size:12.5px;cursor:pointer;transition:.12s;
}
.tb-btn:hover{background:var(--bg-elevated);color:var(--text-primary);}
.tb-btn.primary{background:var(--accent);color:var(--accent-text);font-weight:600;}
.tb-btn.primary:hover{background:var(--accent-hover);}

/* Body row: sidebar + main */
#body-row{flex:1;display:flex;min-height:0;}

/* Sidebar */
#sidebar{
  width:236px;min-width:236px;background:var(--bg-sidebar);border-right:1px solid var(--border);
  display:flex;flex-direction:column;transition:width .16s ease,min-width .16s ease;
}
#sidebar.collapsed{width:52px;min-width:52px;}
#sidebar.collapsed .side-label,#sidebar.collapsed .cat-title span,#sidebar.collapsed .tool-row span{display:none;}
.side-search{padding:10px;border-bottom:1px solid var(--border-soft);}
.side-search input{
  width:100%;background:var(--bg-input);border:1px solid var(--border);border-radius:6px;
  color:var(--text-primary);padding:6px 8px;font-size:12.5px;outline:none;
}
.side-search input:focus{border-color:var(--accent);}
#sidebar.collapsed .side-search{display:none;}
.side-scroll{flex:1;overflow-y:auto;padding:6px 0 10px;}
.cat-title{
  display:flex;align-items:center;gap:6px;padding:9px 12px 5px;font-size:10.5px;font-weight:700;
  letter-spacing:.7px;text-transform:uppercase;color:var(--text-dim);
}
.tool-row{
  display:flex;align-items:center;gap:9px;padding:6px 12px;margin:1px 6px;border-radius:6px;
  font-size:12.8px;color:var(--text-secondary);cursor:pointer;white-space:nowrap;overflow:hidden;
}
.tool-row .ic{width:16px;text-align:center;flex-shrink:0;font-size:13px;}
.tool-row:hover{background:var(--bg-elevated);color:var(--text-primary);}
.tool-row.active{background:var(--accent-soft);color:var(--accent);font-weight:600;}
.tool-row .star{margin-left:auto;opacity:0;font-size:12px;color:var(--text-dim);}
.tool-row:hover .star{opacity:1;}
.tool-row .star.on{opacity:1;color:var(--warning);}
#sidebar-toggle{
  border-top:1px solid var(--border-soft);padding:9px 12px;display:flex;align-items:center;gap:8px;
  color:var(--text-dim);cursor:pointer;font-size:12px;
}
#sidebar-toggle:hover{color:var(--text-primary);}

/* Main column */
#main-col{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg-app);}
#tabbar{
  display:flex;align-items:stretch;background:var(--bg-sidebar);border-bottom:1px solid var(--border);
  overflow-x:auto;min-height:38px;
}
.tab{
  display:flex;align-items:center;gap:7px;padding:0 10px 0 12px;font-size:12.5px;color:var(--text-secondary);
  border-right:1px solid var(--border-soft);cursor:pointer;white-space:nowrap;position:relative;user-select:none;
  background:transparent;
}
.tab.active{background:var(--bg-app);color:var(--text-primary);}
.tab.active::after{content:"";position:absolute;left:0;right:0;top:0;height:2px;background:var(--accent);}
.tab .x{width:16px;height:16px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--text-dim);}
.tab .x:hover{background:var(--bg-elevated);color:var(--text-primary);}
.tab .dirty-dot{width:6px;height:6px;border-radius:50%;background:var(--text-dim);}

#workspace{flex:1;min-height:0;position:relative;}
.tool-pane{position:absolute;inset:0;overflow:auto;display:none;}
.tool-pane.active{display:block;}

/* Empty state */
.empty-state{
  height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;
  color:var(--text-dim);text-align:center;padding:20px;
}
.empty-state .glyph{font-size:34px;margin-bottom:6px;}
.empty-state h3{margin:0;color:var(--text-secondary);font-weight:600;font-size:15px;}
.empty-state p{margin:0;font-size:12.5px;max-width:340px;}

/* Statusbar */
#statusbar{
  height:24px;min-height:24px;display:flex;align-items:center;gap:16px;padding:0 12px;
  background:var(--accent);color:var(--accent-text);font-size:11px;font-family:var(--mono);
}
[data-theme="light"] #statusbar{background:var(--bg-elevated);color:var(--text-secondary);border-top:1px solid var(--border);}
#statusbar .seg{display:flex;align-items:center;gap:5px;}
#statusbar .sp{flex:1;}
#statusbar .status-ok{color:var(--success);}
#statusbar .status-err{color:#fff;}
[data-theme="light"] #statusbar .status-err{color:var(--danger);}

/* ---------- Generic tool layout helpers ---------- */
.tool-shell{display:flex;flex-direction:column;height:100%;}
.tool-toolbar{
  display:flex;align-items:center;gap:6px;padding:8px 12px;border-bottom:1px solid var(--border);
  background:var(--bg-panel);flex-wrap:wrap;
}
.tool-toolbar .grow{flex:1;}
.btn{
  background:var(--bg-elevated);border:1px solid var(--border);color:var(--text-primary);
  border-radius:6px;padding:6px 11px;font-size:12px;cursor:pointer;font-weight:500;transition:.12s;
}
.btn:hover{border-color:var(--accent);color:var(--accent);}
.btn.primary{background:var(--accent);border-color:var(--accent);color:var(--accent-text);}
.btn.primary:hover{background:var(--accent-hover);color:var(--accent-text);}
.btn.ghost{background:transparent;}
.btn:disabled{opacity:.4;cursor:default;}
select.mini,input.mini{
  background:var(--bg-input);border:1px solid var(--border);border-radius:6px;color:var(--text-primary);
  padding:6px 8px;font-size:12px;outline:none;
}
select.mini:focus,input.mini:focus{border-color:var(--accent);}
.tool-body{flex:1;min-height:0;display:flex;}
.split{flex:1;min-width:0;display:flex;flex-direction:column;border-right:1px solid var(--border);}
.split:last-child{border-right:none;}
.split-header{
  padding:6px 12px;font-size:10.5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;
  color:var(--text-dim);background:var(--bg-panel);border-bottom:1px solid var(--border-soft);
  display:flex;align-items:center;gap:8px;
}
.split-header .grow{flex:1;}
.cm-wrap{flex:1;min-height:0;}
.CodeMirror{height:100%;font-family:var(--mono)!important;font-size:12.5px;background:var(--bg-input)!important;}
[data-theme="light"] .CodeMirror{background:#fbfbfd!important;color:#1c1e26!important;}
[data-theme="light"] .CodeMirror-gutters{background:#f4f5f8!important;border-color:var(--border)!important;}
.plain-textarea{
  flex:1;width:100%;resize:none;border:none;outline:none;background:var(--bg-input);color:var(--text-primary);
  font-family:var(--mono);font-size:12.5px;padding:12px;line-height:1.55;
}
.field-row{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--border-soft);flex-wrap:wrap;}
.field-row label{font-size:11.5px;color:var(--text-secondary);min-width:80px;}
.pill{padding:2px 8px;border-radius:20px;font-size:10.5px;font-weight:700;letter-spacing:.3px;}
.pill.ok{background:rgba(79,209,139,.14);color:var(--success);}
.pill.err{background:rgba(240,97,109,.14);color:var(--danger);}
.result-box{padding:12px;font-family:var(--mono);font-size:12.5px;overflow:auto;white-space:pre-wrap;word-break:break-word;flex:1;}
.mono-block{font-family:var(--mono);font-size:12.5px;background:var(--bg-input);border:1px solid var(--border);border-radius:7px;padding:10px;white-space:pre-wrap;word-break:break-all;}
.err-banner{
  margin:0 12px;padding:9px 11px;border-radius:7px;background:rgba(240,97,109,.1);border:1px solid rgba(240,97,109,.35);
  color:var(--danger);font-size:12px;display:none;font-family:var(--mono);
}
.err-banner.show{display:block;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:12px;}
.card{background:var(--bg-panel);border:1px solid var(--border);border-radius:9px;padding:14px;}
.card h4{margin:0 0 10px;font-size:11.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-dim);}
.stack{display:flex;flex-direction:column;gap:8px;}
.hash-row{display:flex;align-items:center;gap:8px;background:var(--bg-input);border:1px solid var(--border);border-radius:7px;padding:8px 10px;}
.hash-row .algo{width:70px;font-size:11px;font-weight:700;color:var(--text-dim);}
.hash-row .val{flex:1;font-family:var(--mono);font-size:11.5px;overflow-x:auto;white-space:nowrap;}
.icon-btn{background:transparent;border:none;color:var(--text-dim);cursor:pointer;padding:4px;border-radius:5px;font-size:13px;}
.icon-btn:hover{background:var(--bg-elevated);color:var(--accent);}
table.kv{width:100%;border-collapse:collapse;font-size:12px;}
table.kv td{padding:5px 8px;border-bottom:1px solid var(--border-soft);vertical-align:top;}
table.kv td:first-child{color:var(--text-dim);width:150px;font-family:var(--mono);}
.toggle-row{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text-secondary);cursor:pointer;user-select:none;}
.toggle-row input{accent-color:var(--accent);}
.tree{font-family:var(--mono);font-size:12.5px;padding:10px;overflow:auto;flex:1;}
.tree ul{list-style:none;margin:0;padding-left:18px;}
.tree li{white-space:nowrap;}
.tree .key{color:#82aaff;}
[data-theme="light"] .tree .key{color:#3b5bdb;}
.tree .str{color:#c3e88d;}
[data-theme="light"] .tree .str{color:#1e8f4e;}
.tree .num{color:#f78c6c;}
.tree .bool{color:#ff9ecb;}
.tree .null{color:var(--text-dim);}
.tree .toggle{cursor:pointer;color:var(--text-dim);display:inline-block;width:12px;}
.tree .match{background:rgba(232,163,61,.28);border-radius:3px;}
.diff-line{display:flex;font-family:var(--mono);font-size:12px;white-space:pre;}
.diff-line .ln{width:38px;flex-shrink:0;color:var(--text-dim);text-align:right;padding-right:8px;user-select:none;}
.diff-line .content{flex:1;padding:0 8px;}
.diff-add{background:rgba(79,209,139,.13);}
.diff-add .ln{color:var(--success);}
.diff-del{background:rgba(240,97,109,.13);}
.diff-del .ln{color:var(--danger);}
.chip-list{display:flex;flex-wrap:wrap;gap:6px;padding:8px 12px;}
.chip{
  background:var(--bg-elevated);border:1px solid var(--border);border-radius:20px;padding:5px 11px;font-size:11.5px;
  cursor:pointer;color:var(--text-secondary);
}
.chip:hover{border-color:var(--accent);color:var(--accent);}

/* ---------- Overlays ---------- */
.overlay{position:fixed;inset:0;background:rgba(8,9,13,.55);display:none;align-items:flex-start;justify-content:center;z-index:100;padding-top:90px;}
.overlay.show{display:flex;}
.palette{
  width:560px;max-width:92vw;background:var(--bg-panel);border:1px solid var(--border);border-radius:11px;
  box-shadow:var(--shadow);overflow:hidden;max-height:70vh;display:flex;flex-direction:column;
}
.palette input{
  width:100%;border:none;outline:none;background:transparent;color:var(--text-primary);
  padding:14px 16px;font-size:14px;border-bottom:1px solid var(--border);
}
.palette-list{overflow-y:auto;padding:6px;}
.palette-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:7px;cursor:pointer;font-size:13px;color:var(--text-secondary);}
.palette-item .ic{width:18px;text-align:center;color:var(--text-dim);}
.palette-item .cat{margin-left:auto;font-size:10.5px;color:var(--text-dim);}
.palette-item.sel{background:var(--accent-soft);color:var(--accent);}
.palette-item.sel .ic,.palette-item.sel .cat{color:var(--accent);}

.modal{background:var(--bg-panel);border:1px solid var(--border);border-radius:11px;box-shadow:var(--shadow);width:460px;max-width:92vw;}
.modal-head{display:flex;align-items:center;padding:14px 16px;border-bottom:1px solid var(--border);font-weight:600;font-size:14px;}
.modal-head .icon-btn{margin-left:auto;}
.modal-body{padding:14px 16px;display:flex;flex-direction:column;gap:12px;max-height:60vh;overflow-y:auto;}
.set-row{display:flex;align-items:center;justify-content:space-between;gap:12px;}
.set-row label{font-size:12.5px;color:var(--text-secondary);}

#toast-stack{position:fixed;bottom:36px;right:16px;display:flex;flex-direction:column;gap:8px;z-index:200;}
.toast{
  background:var(--bg-elevated);border:1px solid var(--border);border-left:3px solid var(--accent);
  color:var(--text-primary);padding:10px 14px;border-radius:7px;font-size:12.5px;box-shadow:var(--shadow);
  min-width:200px;animation:toastin .18s ease;
}
.toast.err{border-left-color:var(--danger);}
.toast.ok{border-left-color:var(--success);}
@keyframes toastin{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

@media (max-width:820px){
  #sidebar{position:absolute;left:0;top:46px;bottom:24px;z-index:50;box-shadow:var(--shadow);}
  #sidebar:not(.collapsed){width:220px;}
  #sidebar.collapsed{width:0;min-width:0;border:none;}
}

/* ---------- Markdown Notes Workspace ---------- */
.notes-shell{display:flex;height:100%;min-height:0;}
.notes-side{width:230px;min-width:230px;border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--bg-panel);}
.notes-side-search{padding:8px;border-bottom:1px solid var(--border-soft);display:flex;gap:6px;}
.notes-side-search input{flex:1;}
.notes-side-scroll{flex:1;overflow-y:auto;padding:4px 0;}
.notes-section-title{display:flex;align-items:center;gap:6px;padding:8px 10px 4px;font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--text-dim);}
.notes-section-title .icon-btn{margin-left:auto;}
.folder-row,.note-row{display:flex;align-items:center;gap:6px;padding:5px 8px;margin:0 6px;border-radius:6px;font-size:12.3px;color:var(--text-secondary);cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.folder-row:hover,.note-row:hover{background:var(--bg-elevated);color:var(--text-primary);}
.note-row.active{background:var(--accent-soft);color:var(--accent);font-weight:600;}
.note-row .dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.note-row .nm{flex:1;overflow:hidden;text-overflow:ellipsis;}
.note-row .pin{font-size:10px;color:var(--warning);}
.tag-chip{display:inline-flex;align-items:center;gap:4px;padding:1px 7px;border-radius:20px;font-size:10.5px;font-weight:600;}
.notes-main{flex:1;display:flex;flex-direction:column;min-width:0;}
.notes-toolbar{display:flex;align-items:center;gap:4px;padding:6px 10px;border-bottom:1px solid var(--border);background:var(--bg-panel);flex-wrap:wrap;}
.tb-icon{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:6px;background:transparent;border:1px solid transparent;color:var(--text-secondary);cursor:pointer;font-size:13px;}
.tb-icon:hover{background:var(--bg-elevated);color:var(--text-primary);border-color:var(--border);}
.tb-sep{width:1px;align-self:stretch;background:var(--border);margin:0 4px;}
.notes-editcol{flex:1;display:flex;min-height:0;}
.notes-editpane,.notes-prevpane{flex:1;min-width:0;display:flex;flex-direction:column;border-right:1px solid var(--border);}
.notes-editpane:last-child,.notes-prevpane:last-child{border-right:none;}
.note-title-input{border:none;outline:none;background:transparent;color:var(--text-primary);font-size:19px;font-weight:700;padding:14px 16px 4px;font-family:var(--ui);}
.note-meta-row{display:flex;align-items:center;gap:10px;padding:0 16px 8px;flex-wrap:wrap;}
.note-tag-input{flex:1;min-width:120px;background:transparent;border:none;outline:none;color:var(--text-secondary);font-size:11.5px;padding:3px 0;}
.notes-preview{flex:1;overflow:auto;padding:16px 22px;font-size:14px;line-height:1.7;color:var(--text-primary);}
.notes-preview h1,.notes-preview h2,.notes-preview h3{border-bottom:1px solid var(--border-soft);padding-bottom:6px;margin-top:1.4em;}
.notes-preview h1{font-size:1.7em;} .notes-preview h2{font-size:1.4em;} .notes-preview h3{font-size:1.18em;}
.notes-preview code{font-family:var(--mono);background:var(--bg-elevated);padding:1px 5px;border-radius:4px;font-size:.9em;}
.notes-preview pre{background:var(--bg-input);border:1px solid var(--border);border-radius:8px;padding:10px 12px;overflow:auto;position:relative;}
.notes-preview pre code{background:none;padding:0;}
.notes-preview table{border-collapse:collapse;width:100%;margin:10px 0;font-size:.92em;}
.notes-preview th,.notes-preview td{border:1px solid var(--border);padding:6px 10px;text-align:left;}
.notes-preview blockquote{border-left:3px solid var(--accent);margin:0;padding:2px 14px;color:var(--text-secondary);background:var(--accent-soft);border-radius:0 6px 6px 0;}
.notes-preview a.wikilink{color:var(--accent);text-decoration:none;border-bottom:1px dashed var(--accent);cursor:pointer;}
.notes-preview a.wikilink.broken{color:var(--danger);border-bottom-color:var(--danger);}
.notes-preview img{max-width:100%;border-radius:6px;}
.notes-preview input[type=checkbox]{margin-right:6px;accent-color:var(--accent);}
.copy-code-btn{position:absolute;top:6px;right:6px;font-size:10.5px;background:var(--bg-elevated);border:1px solid var(--border);color:var(--text-secondary);border-radius:5px;padding:2px 7px;cursor:pointer;opacity:.75;}
.copy-code-btn:hover{opacity:1;color:var(--accent);}
.notes-statusbar{display:flex;gap:14px;padding:5px 12px;border-top:1px solid var(--border);font-size:10.8px;color:var(--text-dim);font-family:var(--mono);background:var(--bg-panel);}
.notes-outline{padding:8px;font-size:12px;}
.notes-outline div{padding:3px 6px;border-radius:5px;cursor:pointer;color:var(--text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.notes-outline div:hover{background:var(--bg-elevated);color:var(--text-primary);}
.notes-backlinks{padding:8px 10px;font-size:11.5px;color:var(--text-secondary);border-top:1px solid var(--border-soft);}
.notes-backlinks .bl-item{padding:4px 6px;border-radius:5px;cursor:pointer;}
.notes-backlinks .bl-item:hover{background:var(--bg-elevated);color:var(--accent);}
.wikilink-hint{position:absolute;background:var(--bg-elevated);border:1px solid var(--border);border-radius:7px;box-shadow:var(--shadow);z-index:50;max-height:180px;overflow-y:auto;min-width:180px;}
.wikilink-hint div{padding:6px 10px;font-size:12px;color:var(--text-secondary);cursor:pointer;}
.wikilink-hint div:hover,.wikilink-hint div.sel{background:var(--accent-soft);color:var(--accent);}
.empty-note-state{flex:1;display:flex;align-items:center;justify-content:center;color:var(--text-dim);font-size:12.5px;flex-direction:column;gap:8px;}
</style>
</head>
<body data-theme="dark">
<div id="app">

  <div id="topbar">
    <div class="brand"><span class="mark">TB</span> Toolbench</div>
    <div class="tb-search" id="open-palette-btn">
      <span>&#128269;</span><span>Search tools & commands…</span>
      <kbd>Ctrl K</kbd>
    </div>
    <div class="tb-spacer"></div>
    <button class="tb-btn" id="import-btn" title="Import a file into a matching tool">&#8593; Import</button>
    <button class="tb-btn" id="theme-btn" title="Toggle theme">&#9788;</button>
    <button class="tb-btn" id="settings-btn" title="Settings">&#9881;</button>
  </div>

  <div id="body-row">
    <div id="sidebar">
      <div class="side-search"><input id="tool-filter" placeholder="Filter tools…"></div>
      <div class="side-scroll" id="side-scroll"></div>
      <div id="sidebar-toggle"><span id="collapse-ic">&#9664;</span><span class="side-label">Collapse</span></div>
    </div>

    <div id="main-col">
      <div id="tabbar"></div>
      <div id="workspace">
        <div class="empty-state" id="empty-state">
          <div class="glyph">&#9670;</div>
          <h3>No tool open</h3>
          <p>Pick something from the sidebar, or press <b>Ctrl K</b> to search every tool and command in Toolbench.</p>
        </div>
      </div>
    </div>
  </div>

  <div id="statusbar">
    <div class="seg" id="sb-tool">Ready</div>
    <div class="seg" id="sb-status"></div>
    <div class="sp"></div>
    <div class="seg" id="sb-meta"></div>
    <div class="seg">UTF-8</div>
    <div class="seg" id="sb-tabs-count">0 tabs open</div>
  </div>
</div>

<input type="file" id="hidden-file-input" style="display:none">

<div class="overlay" id="palette-overlay">
  <div class="palette">
    <input id="palette-input" placeholder="Type a tool name or command…" autocomplete="off">
    <div class="palette-list" id="palette-list"></div>
  </div>
</div>

<div class="overlay" id="settings-overlay">
  <div class="modal">
    <div class="modal-head">Settings <button class="icon-btn" id="settings-close">&#10005;</button></div>
    <div class="modal-body">
      <div class="set-row"><label>Theme</label>
        <select class="mini" id="set-theme"><option value="dark">Dark</option><option value="light">Light</option></select>
      </div>
      <div class="set-row"><label>Editor font size</label>
        <select class="mini" id="set-fontsize"><option>12</option><option>13</option><option>14</option><option>15</option><option>16</option></select>
      </div>
      <div class="set-row"><label>Indent size</label>
        <select class="mini" id="set-indent"><option>2</option><option>4</option></select>
      </div>
      <div class="set-row"><label>Restore tabs on reload</label>
        <input type="checkbox" id="set-restore" checked>
      </div>
      <div class="set-row"><label>Clear saved workspace</label>
        <button class="btn" id="clear-workspace">Clear</button>
      </div>
    </div>
  </div>
</div>

<div id="toast-stack"></div>

<script src="app.js"></script>
</body>
</html>
